<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Mobile - Inventário Tetris</title>
    <style>
        /* Base e Reset Mobile-First */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #0d0d12; 
            color: #e0e0e0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Layout Principal */
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .aba { display: none; animation: fadeIn 0.2s ease-in; }
        .aba.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h2 { border-bottom: 2px solid #bb86fc; padding-bottom: 8px; margin-bottom: 15px; font-size: 1.3rem; }
        .card { background: #1a1a24; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #2a2a35; }

        /* Finanças e Patrocinador */
        .financas { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #1a1a24; padding: 12px; border-radius: 10px; border: 1px solid #bb86fc; }
        .saldo { font-size: 1.1rem; font-weight: bold; color: #03dac6; }
        .promo-box { display: flex; gap: 5px; }
        .promo-box input { background: #0d0d12; color: white; border: 1px solid #555; border-radius: 6px; padding: 6px; width: 90px; text-transform: lowercase; }
        .promo-box button { background: #bb86fc; color: black; border: none; border-radius: 6px; padding: 6px 10px; font-weight: bold; }

        /* Aba Quarto - Móveis */
        .quarto-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .movel { position: relative; background: #252530; padding: 15px; border-radius: 8px; text-align: center; width: calc(50% - 5px); border: 1px solid #444; }
        .btn-remover { position: absolute; top: -8px; right: -8px; background: #cf6679; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; touch-action: manipulation; }

        /* Inventário Tetris (Personagem) */
        .grid-wrapper { display: flex; justify-content: center; margin-top: 10px; }
        .tetris-grid { 
            position: relative;
            display: grid; 
            grid-template-columns: repeat(6, 45px); 
            grid-template-rows: repeat(8, 45px); 
            gap: 1px; 
            background: #333; 
            border: 2px solid #555; 
            background-color: #1a1a24;
            /* touch-action: none impede a tela de rolar ao arrastar na grade */
            touch-action: none; 
        }
        .grid-cell { background: #0d0d12; width: 45px; height: 45px; border: 1px dashed #2a2a35; }
        
        /* Itens Arrastáveis */
        .item-tetris {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            cursor: grab;
            touch-action: none;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
            z-index: 100;
            transition: transform 0.1s;
        }
        .item-tetris.dragging { z-index: 999; transform: scale(1.05); opacity: 0.9; cursor: grabbing; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* Tipos de Itens e Cores */
        .tipo-arma { background: rgba(207, 102, 121, 0.8); border: 1px solid #cf6679; }
        .tipo-comida { background: rgba(3, 218, 198, 0.8); border: 1px solid #03dac6; }
        .tipo-roupa { background: rgba(187, 134, 252, 0.8); border: 1px solid #bb86fc; }

        /* Área de Inventário (Itens Soltos) */
        .inventario-lista { display: flex; flex-wrap: wrap; gap: 10px; min-height: 60px; padding: 10px; background: #1a1a24; border: 1px dashed #555; border-radius: 8px; }
        .inventario-lista .item-tetris { position: relative; /* Volta ao fluxo normal fora da grade */ }

        /* Navegação Inferior */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #15151e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2a2a35; z-index: 1000; }
        .nav-btn { background: transparent; border: none; color: #666; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; width: 33%; height: 100%; touch-action: manipulation; }
        .nav-btn.ativa { color: #bb86fc; }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="content">
        <div class="financas">
            <div class="saldo">Cash: $<span id="display-cash">0</span></div>
            <div class="promo-box">
                <input type="text" id="promo-input" placeholder="Código">
                <button onclick="resgatarCodigo()">OK</button>
            </div>
        </div>

        <div id="aba-personagem" class="aba ativa">
            <h2>Personagem (Equipados)</h2>
            <p style="font-size: 0.8rem; color: #888; text-align: center; margin-bottom: 10px;">Arraste para a grade (6x8)</p>
            <div class="grid-wrapper">
                <div class="tetris-grid" id="grid-personagem">
                    </div>
            </div>
        </div>

        <div id="aba-inventario" class="aba">
            <h2>Inventário Geral</h2>
            <div class="card">
                <p style="font-size: 0.85rem; margin-bottom: 10px; color: #aaa;">Arraste itens daqui para o Personagem.</p>
                <div class="inventario-lista" id="lista-itens-soltos">
                    <div class="item-tetris tipo-arma" data-w="1" data-h="3" id="item1">Espada<br>(1x3)</div>
                    <div class="item-tetris tipo-arma" data-w="2" data-h="2" id="item2">Escudo<br>(2x2)</div>
                    <div class="item-tetris tipo-comida" data-w="1" data-h="1" id="item3">Maçã</div>
                    <div class="item-tetris tipo-comida" data-w="1" data-h="1" id="item4">Poção</div>
                    <div class="item-tetris tipo-roupa" data-w="2" data-h="3" id="item5">Armadura<br>(2x3)</div>
                </div>
            </div>

            <h2>Móveis Guardados</h2>
            <div class="card">
                <ul id="lista-moveis-guardados" style="padding-left: 20px; color: #ccc; font-size: 0.9rem;">
                    </ul>
            </div>
        </div>

        <div id="aba-quarto" class="aba">
            <h2>Seu Quarto</h2>
            <div class="quarto-grid" id="area-quarto">
                <div class="movel" id="movel-1">
                    Cama de Solteiro
                    <button class="btn-remover" onclick="removerMovel('movel-1', 'Cama de Solteiro')">X</button>
                </div>
                <div class="movel" id="movel-2">
                    Mesa de Trabalho
                    <button class="btn-remover" onclick="removerMovel('movel-2', 'Mesa de Trabalho')">X</button>
                </div>
                <div class="movel" id="movel-3">
                    Baú de Madeira
                    <button class="btn-remover" onclick="removerMovel('movel-3', 'Baú de Madeira')">X</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn ativa" onclick="mudarAba('personagem', this)">
            <span class="nav-icon">🧍</span>Personagem
        </button>
        <button class="nav-btn" onclick="mudarAba('inventario', this)">
            <span class="nav-icon">📦</span>Inventário
        </button>
        <button class="nav-btn" onclick="mudarAba('quarto', this)">
            <span class="nav-icon">🛏️</span>Quarto
        </button>
    </div>

    <script>
        // --- 1. Sistema Financeiro ---
        let cash = 0;
        let codigoUsado = false;

        function resgatarCodigo() {
            const input = document.getElementById('promo-input');
            const codigo = input.value.trim().toLowerCase();
            if (codigo === 'cash4053' && !codigoUsado) {
                cash += 10000;
                codigoUsado = true;
                document.getElementById('display-cash').innerText = cash.toLocaleString();
                alert("Código aceito! +10.000 Cash.");
                input.value = ""; input.disabled = true;
            } else if (codigoUsado) {
                alert("Código já resgatado.");
            } else {
                alert("Código inválido.");
            }
        }

        // --- 2. Navegação Mobile ---
        function mudarAba(idAba, btn) {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativa'));
            document.getElementById('aba-' + idAba).classList.add('ativa');
            btn.classList.add('ativa');
        }

        // --- 3. Sistema de Móveis ---
        function removerMovel(id, nome) {
            const movel = document.getElementById(id);
            if(movel) movel.remove();
            const lista = document.getElementById('lista-moveis-guardados');
            const li = document.createElement('li');
            li.innerText = nome;
            li.style.marginBottom = "5px";
            lista.appendChild(li);
        }

        // --- 4. MOTOR DO INVENTÁRIO TETRIS ---
        const GRID_COLS = 6;
        const GRID_ROWS = 8;
        const CELL_SIZE = 45; // tamanho exato da célula no CSS (45px) + 1px gap será compensado
        const GRID_GAP = 1;
        const REAL_CELL_SIZE = CELL_SIZE + GRID_GAP;
        
        const gridElement = document.getElementById('grid-personagem');
        const inventarioLista = document.getElementById('lista-itens-soltos');
        
        // Matriz de colisão (0 = vazio, 1 = ocupado)
        let matrix = Array(GRID_ROWS).fill(null).map(() => Array(GRID_COLS).fill(0));

        // Desenhar fundo da grade
        for(let i = 0; i < GRID_ROWS * GRID_COLS; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            gridElement.appendChild(cell);
        }

        // Configurar dimensões físicas dos itens baseados nos atributos data-w e data-h
        document.querySelectorAll('.item-tetris').forEach(item => {
            const w = parseInt(item.getAttribute('data-w'));
            const h = parseInt(item.getAttribute('data-h'));
            item.style.width = `${(w * CELL_SIZE) + ((w-1) * GRID_GAP)}px`;
            item.style.height = `${(h * CELL_SIZE) + ((h-1) * GRID_GAP)}px`;
            
            // Eventos de Toque/Mouse unificados (Pointer Events)
            item.addEventListener('pointerdown', iniciarArraste);
        });

        let itemArrastado = null;
        let offsetX = 0, offsetY = 0;
        let origemIncial = null; // Para saber se veio da grade ou do inventário solto
        let posInicial = { col: -1, row: -1 };

        function iniciarArraste(e) {
            // Previne comportamento padrão (como scroll)
            e.preventDefault(); 
            itemArrastado = e.target;
            
            // Se o item estava na grade, removemos ele da matriz de colisão temporariamente
            if (itemArrastado.parentElement === gridElement) {
                origemIncial = 'grid';
                posInicial.col = parseInt(itemArrastado.getAttribute('data-col'));
                posInicial.row = parseInt(itemArrastado.getAttribute('data-row'));
                atualizarMatriz(posInicial.col, posInicial.row, parseInt(itemArrastado.getAttribute('data-w')), parseInt(itemArrastado.getAttribute('data-h')), 0);
            } else {
                origemIncial = 'inventario';
                // Move o item visualmente para dentro do container da grade para arrastar solto
                gridElement.appendChild(itemArrastado);
            }

            // Calcula onde o usuário tocou no item para manter relativo
            const rect = itemArrastado.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            itemArrastado.classList.add('dragging');
            itemArrastado.style.position = 'absolute';
            
            moverItem(e); // Atualiza posição inicial

            document.addEventListener('pointermove', arrastarItem);
            document.addEventListener('pointerup', soltarItem);
        }

        function arrastarItem(e) {
            e.preventDefault();
            moverItem(e);
        }

        function moverItem(e) {
            if (!itemArrastado) return;
            const gridRect = gridElement.getBoundingClientRect();
            // Posição relativa ao container da grade
            const x = e.clientX - gridRect.left - offsetX;
            const y = e.clientY - gridRect.top - offsetY;
            itemArrastado.style.left = `${x}px`;
            itemArrastado.style.top = `${y}px`;
        }

        function soltarItem(e) {
            document.removeEventListener('pointermove', arrastarItem);
            document.removeEventListener('pointerup', soltarItem);
            
            if (!itemArrastado) return;
            itemArrastado.classList.remove('dragging');

            const gridRect = gridElement.getBoundingClientRect();
            const w = parseInt(itemArrastado.getAttribute('data-w'));
            const h = parseInt(itemArrastado.getAttribute('data-h'));

            // Calcular em qual coluna/linha o item foi solto (baseado no centro do item)
            const itemX = (e.clientX - gridRect.left - offsetX) + (w * REAL_CELL_SIZE / 2);
            const itemY = (e.clientY - gridRect.top - offsetY) + (h * REAL_CELL_SIZE / 2);

            const alvoCol = Math.floor(itemX / REAL_CELL_SIZE);
            const alvoRow = Math.floor(itemY / REAL_CELL_SIZE);

            // Verificar se soltou fora da grade (Devolve para o inventário)
            if (alvoCol < 0 || alvoCol + w > GRID_COLS || alvoRow < 0 || alvoRow + h > GRID_ROWS) {
                devolverAoInventario();
            } else {
                // Verificar colisão
                if (verificarEspacoLivre(alvoCol, alvoRow, w, h)) {
                    encaixarNaGrade(alvoCol, alvoRow, w, h);
                } else {
                    // Bateu em algo. Volta de onde veio.
                    if (origemIncial === 'grid') {
                        encaixarNaGrade(posInicial.col, posInicial.row, w, h); // Volta pro lugar antigo
                    } else {
                        devolverAoInventario();
                    }
                }
            }
            itemArrastado = null;
        }

        function verificarEspacoLivre(c, r, w, h) {
            for (let i = r; i < r + h; i++) {
                for (let j = c; j < c + w; j++) {
                    if (matrix[i][j] === 1) return false;
                }
            }
            return true;
        }

        function atualizarMatriz(c, r, w, h, valor) {
            for (let i = r; i < r + h; i++) {
                for (let j = c; j < c + w; j++) {
                    matrix[i][j] = valor;
                }
            }
        }

        function encaixarNaGrade(col, row, w, h) {
            itemArrastado.style.left = `${col * REAL_CELL_SIZE}px`;
            itemArrastado.style.top = `${row * REAL_CELL_SIZE}px`;
            itemArrastado.setAttribute('data-col', col);
            itemArrastado.setAttribute('data-row', row);
            atualizarMatriz(col, row, w, h, 1);
            
            // Muda para a aba do personagem caso tenha arrastado estando na aba inventario
            if(!document.getElementById('aba-personagem').classList.contains('ativa')){
                 mudarAba('personagem', document.querySelector('.nav-btn'));
            }
        }

        function devolverAoInventario() {
            itemArrastado.style.position = 'relative';
            itemArrastado.style.left = '0';
            itemArrastado.style.top = '0';
            itemArrastado.removeAttribute('data-col');
            itemArrastado.removeAttribute('data-row');
            inventarioLista.appendChild(itemArrastado);
        }
    </script>
</body>
</html>
